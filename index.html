<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>STAGEHERO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ===== ПОЛНЫЙ СБРОС И БАЗА ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #03050a;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(0, 255, 255, 0.03) 0%, transparent 30%),
        radial-gradient(circle at 90% 70%, rgba(255, 0, 255, 0.03) 0%, transparent 40%),
        linear-gradient(180deg, #0a0c14 0%, #010101 100%);
      color: #b0f0ff;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    /* ===== ОСНОВНОЙ КОНТЕЙНЕР ===== */
    .container {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== ЗАГОЛОВОК СТРОГО ПО ОБРАЗЦУ ===== */
    h1 {
      font-size: 5vw;              /* фиксированный размер из вашего примера */
      font-weight: 800;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 6px;
      background: linear-gradient(135deg, #00ffff, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
      margin-bottom: 32px;
      line-height: 1.2;
      word-break: break-word;
    }

    /* ===== QR-КОД БЕЗ ЕДИНОГО ЛИШНЕГО ЭЛЕМЕНТА ===== */
    #qr-code {
      width: 300px;
      height: 300px;

      background: white;
      border: 4px solid #00ffff;    /* обводка циан, будет меняться под цвет кнопки */
      border-radius: 24px;           /* скруглены только углы обводки */
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #qr-code canvas, #qr-code img {
      width: 280px !important;      /* сам QR-код чуть меньше рамки, чтобы не обрезаться */
      height: 280px !important;
      display: block;
      background: white;
      padding: 10px;
    }

    /* ===== КНОПКА ЗАЯВКА СТРОГО ПО ОБРАЗЦУ ===== */
    .btn-cyber {
      background: transparent;
      border: 2px solid #00ffff;
      color: #00ffff;
      padding: 18px 32px;
      border-radius: 40px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 4px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 0 20px #00ffff60;
      width: 100%;
      max-width: 320px;
      margin: 0 auto;
      display: block;
    }

    .btn-cyber:hover {
      background: #00ffff;
      color: #000;
      box-shadow: 0 0 50px #00ffff;
      transform: scale(1.02);
    }

    /* ===== МОДАЛКА АККУРАТНО ПОДКЛЮЧЕНА ===== */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(3, 5, 10, 0.95);
      backdrop-filter: blur(8px);
      z-index: 10001;
      display: none;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .modal-form {
      background: rgba(8, 20, 30, 0.95);
      backdrop-filter: blur(12px);
      border: 2px solid #00ffff;
      border-radius: 40px;
      padding: 32px;
      max-width: 460px;
      width: 100%;
      box-shadow: 0 0 60px #00ffff40;
    }

    .modal-form h2 {
      background: linear-gradient(135deg, #00ffff, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 2rem;
      text-align: center;
      margin-bottom: 28px;
      text-transform: uppercase;
      letter-spacing: 4px;
    }

    .form-group {
      margin-bottom: 22px;
    }

    .form-label {
      color: #ff00ff;
      margin-bottom: 10px;
      font-size: 0.9rem;
      letter-spacing: 2px;
      font-weight: 500;
      display: block;
      text-transform: uppercase;
    }

    .form-input {
      width: 100%;
      background: rgba(0, 20, 30, 0.8);
      border: 2px solid #00ffff;
      border-radius: 60px;
      padding: 16px 24px;
      font-size: 1rem;
      color: #00ffff;
      font-family: 'Inter', monospace;
      outline: none;
      transition: 0.2s;
    }

    .form-input:focus {
      border-color: #ff00ff;
      box-shadow: 0 0 30px #ff00ff80;
    }

    .form-input::placeholder {
      color: rgba(0, 255, 255, 0.3);
    }

    .form-buttons {
      display: flex;
      gap: 12px;
      margin-top: 28px;
    }

    .form-btn {
      flex: 1;
      background: transparent;
      border: 2px solid #00ffff;
      border-radius: 60px;
      padding: 14px 16px;
      color: #00ffff;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.9rem;
    }

    .form-btn:hover {
      background: #00ffff;
      color: #000;
      box-shadow: 0 0 30px #00ffff;
    }

    /* красная кнопка отмены с красным свечением */
    .form-btn.cancel {
      border-color: #ff0055;
      color: #ff88aa;
    }

    .form-btn.cancel:hover {
      background: #ff0055;
      color: white;
      border-color: #ff0055;
      box-shadow: 0 0 40px #ff0055;  /* красное свечение */
    }

    .status-message {
      margin-top: 20px;
      text-align: center;
      font-size: 1rem;
      font-weight: 600;
      min-height: 28px;
      color: #00ffaa;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* адаптация */
    @media (max-width: 500px) {
      h1 {
        font-size: 8vw;
      }
      
      #qr-code {
        width: 260px;
        height: 260px;
      }
      
      #qr-code canvas, #qr-code img {
        width: 240px !important;
        height: 240px !important;
      }
      
      .btn-cyber {
        font-size: 1rem;
        padding: 16px 20px;
        max-width: 280px;
      }
    }

    @media (max-width: 360px) {
      h1 {
        font-size: 8vw;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- ЗАГОЛОВОК СТРОГО ПО ОБРАЗЦУ: STAGEHERO -->
    <h1>STAGEHERO</h1>
    
    <!-- QR-КОД: ОДИН ЕДИНСТВЕННЫЙ ЭЛЕМЕНТ С ОБВОДКОЙ -->
    <div id="qr-code"></div>
    
    <!-- КНОПКА ЗАЯВКА (ТЕКСТ ТОЛЬКО "ЗАЯВКА") -->
    <button class="btn-cyber" id="requestBtn">ЗАЯВКА</button>
  </div>

  <!-- МОДАЛКА -->
  <div class="modal-overlay" id="requestModal">
    <div class="modal-form">
      <h2>⚡ ЗАЯВКА</h2>
      <div class="form-group">
        <label class="form-label">НИКНЕЙМ</label>
        <input type="text" id="nickname" class="form-input" placeholder="Введите никнейм">
      </div>
      <div class="form-group">
        <label class="form-label">СПОСОБ СВЯЗИ</label>
        <input type="text" id="contactMethod" class="form-input" placeholder="Telegram / Discord / Email">
      </div>
      <div class="form-buttons">
        <button class="form-btn" id="submitRequest">ОТПРАВИТЬ</button>
        <button class="form-btn cancel" id="cancelRequest">ОТМЕНА</button>
      </div>
      <div id="requestStatus" class="status-message"></div>
    </div>
  </div>

  <!-- БИБЛИОТЕКИ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script>
    // FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyCVr3ZztynpNzkeFY3aLKFN777oPxxxxxx",
      authDomain: "inspector-24f9b.firebaseapp.com",
      projectId: "inspector-24f9b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ГЕНЕРАЦИЯ QR-КОДА ПРЯМО В #qr-код (БЕЗ ЛИШНИХ ОБЕРТОК)
    document.addEventListener('DOMContentLoaded', function() {
      const qrElement = document.getElementById('qr-code');
      qrElement.innerHTML = ''; // очищаем на всякий случай
      
      try {
        new QRCode(qrElement, {
          text: 'https://stage-master.onrender.com',
          width: 280,
          height: 280,
          colorDark: "#000000",
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel.H
        });
      } catch (e) {
        qrElement.innerHTML = '⚠️ Ошибка QR';
      }
    });

    // МОДАЛКА
    const modal = document.getElementById('requestModal');
    const requestBtn = document.getElementById('requestBtn');
    const cancelBtn = document.getElementById('cancelRequest');
    const submitBtn = document.getElementById('submitRequest');
    const nicknameInput = document.getElementById('nickname');
    const contactMethodInput = document.getElementById('contactMethod');
    const statusDiv = document.getElementById('requestStatus');

    requestBtn.addEventListener('click', () => {
      modal.style.display = 'flex';
      nicknameInput.value = '';
      contactMethodInput.value = '';
      statusDiv.textContent = '';
    });

    cancelBtn.addEventListener('click', () => {
      modal.style.display = 'none';
    });

    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        modal.style.display = 'none';
      }
    });

    submitBtn.addEventListener('click', async () => {
      const nickname = nicknameInput.value.trim();
      const contactMethod = contactMethodInput.value.trim();
      
      if (!nickname || !contactMethod) {
        statusDiv.textContent = '❌ ЗАПОЛНИТЕ ПОЛЯ';
        statusDiv.style.color = '#ff0f3b';
        return;
      }

      statusDiv.textContent = '⏳ ОТПРАВКА...';
      statusDiv.style.color = '#00ffff';

      try {
        await db.collection('requests').add({
          nickname: nickname,
          contactMethod: contactMethod,
          timestamp: firebase.firestore.FieldValue.serverTimestamp(),
          userAgent: navigator.userAgent
        });

        statusDiv.textContent = '✅ ОТПРАВЛЕНО!';
        statusDiv.style.color = '#ff00ff';
        
        setTimeout(() => {
          modal.style.display = 'none';
        }, 1500);
        
      } catch (e) {
        statusDiv.textContent = '❌ ОШИБКА: ' + e.message;
        statusDiv.style.color = '#ff0f3b';
      }
    });
  </script>
</body>
</html>
